<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaidTasks - Earn with Online Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --color-bg-dark: #052e1b;
    --color-bg-dark-2: #064e2a;
    --color-primary: #22c55e;
    --color-primary-light: #4ade80;
    --color-green: #22c55e;
    --color-green-dark: #16a34a;
    --color-text-muted: #bbf7d0;
    --color-text-dim: #86efac;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 30% 20%, #065f46 0%, #052e1b 60%, #022c22 100%);
    color: white;
    overflow: hidden;
    height: 100vh;
}

/* Background */
.background {
    position: fixed;
    inset: 0;
    z-index: 1;
}

/* Glow circles */
.circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
}

.circle-1 {
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(34,197,94,.45), transparent 70%);
    top: 100px;
    left: -40px;
    animation: float1 8s infinite ease-in-out;
}

.circle-2 {
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(74,222,128,.35), transparent 70%);
    bottom: 180px;
    right: 120px;
    animation: float2 9s infinite ease-in-out;
}

.circle-3 {
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(134,239,172,.25), transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    animation: float3 10s infinite ease-in-out;
}

/* Particles */
.particle {
    position: absolute;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 14px rgba(74,222,128,.9);
}

.particle-1 { width:8px;height:8px;top:140px;left:60px;animation:particle 7s infinite;}
.particle-2 { width:6px;height:6px;top:260px;right:70px;animation:particle 8s infinite;}
.particle-3 { width:10px;height:10px;bottom:200px;left:90px;animation:particle 6.5s infinite;}
.particle-4 { width:7px;height:7px;bottom:320px;right:100px;animation:particle 7.5s infinite;}

/* Main */
.main-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
}

.app-name {
    position: absolute;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 36px;
    font-weight: 800;
    opacity: 0;
}

/* Icon */
.icon-container { margin-bottom: 20px; }

.icon-glow {
    position: absolute;
    width: 140px;
    height: 140px;
    background: radial-gradient(circle, rgba(34,197,94,.7), transparent 70%);
    border-radius: 50%;
    filter: blur(24px);
    transform: scale(.5);
    opacity: 0;
}

.icon-outer {
    width: 96px;
    height: 96px;
    background: linear-gradient(145deg, #16a34a, #22c55e);
    border-radius: 28px;
    border: 3px solid #4ade80;
    display:flex;
    align-items:center;
    justify-content:center;
    transform: scale(.5);
    opacity: 0;
    box-shadow: 0 10px 30px rgba(0,0,0,.45), inset 0 0 18px rgba(255,255,255,.08);
}

.icon-emoji { font-size: 22px; }

/* Text */
.tagline {
    margin-top: 120px;
    font-size: 18px;
    font-weight: 700;
    color: #4ade80;
    opacity: 0;
    transform: translateY(20px);
    text-align:center;
}

.slogan {
    margin-top: 14px;
    font-size: 15px;
    color: var(--color-text-muted);
    min-height: 60px;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity: 0;
    text-align:center;
}

/* Spinner */
.loading-spinner {
    margin-top: 20px;
    width: 50px;
    height: 50px;
    border: 4px solid rgba(34,197,94,.25);
    border-top-color: #4ade80;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    opacity: 0;
}

/* Version */
.version {
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    color:var(--color-text-dim);
    opacity:0;
}

/* Flash */
.flash {
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
    z-index:9999;
}

/* Animations */
@keyframes float1 {50%{transform:translate(-30px,-20px)}}
@keyframes float2 {50%{transform:translate(30px,-20px)}}
@keyframes float3 {50%{transform:translate(-40%,-40%)}}
@keyframes particle {50%{transform:translateY(-20px)}}
@keyframes spin {to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="background">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>

    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>
</div>

<div class="flash" id="flash"></div>

<div class="main-content">
    <div class="app-name" id="appName"></div>

    <div class="icon-container">
        <div class="icon-glow" id="iconGlow"></div>
        <div class="icon-outer" id="iconOuter">
            <div class="icon-emoji" id="iconEmoji">✅</div>
        </div>
    </div>

    <div class="tagline" id="tagline">Complete Tasks • Earn Rewards</div>
    <div class="slogan" id="slogan"></div>
    <div class="loading-spinner" id="loading"></div>
    <div class="version" id="version">PaidTasks • Smart Work Platform</div>
</div>

<script>
const appName = document.getElementById('appName');
const iconGlow = document.getElementById('iconGlow');
const iconOuter = document.getElementById('iconOuter');
const slogan = document.getElementById('slogan');
const loading = document.getElementById('loading');
const version = document.getElementById('version');
const flash = document.getElementById('flash');

const slogans = [
 "Do simple online tasks",
 "Work anytime, anywhere",
 "Small tasks, real rewards",
 "Fast & flexible earning"
];

function typeText(el, text, speed=20){
 return new Promise(res=>{
  let i=0; el.textContent="";
  const t=setInterval(()=>{
   el.textContent+=text[i++];
   if(i>=text.length){clearInterval(t);res();}
  },speed);
 });
}

function show(el,d=200){
 return new Promise(r=>{
  el.style.transition=`all ${d}ms ease`;
  el.style.opacity=1;
  el.style.transform="translateY(0) scale(1)";
  setTimeout(r,d);
 });
}

async function run(){
 flash.style.opacity=.7;
 await new Promise(r=>setTimeout(r,60));
 flash.style.opacity=0;

 await typeText(appName,"PaidTasks",18);
 await show(appName,180);

 await show(iconGlow,180);
 await show(iconOuter,220);

 await show(tagline,160);

 slogan.style.opacity=1;
 for(const s of slogans){
  await typeText(slogan,s,18);
  await new Promise(r=>setTimeout(r,500));
  slogan.style.opacity=0;
  await new Promise(r=>setTimeout(r,200));
  slogan.style.opacity=1;
 }

 await show(loading,160);
 await show(version,160);

 setTimeout(()=>{
  flash.style.opacity=1;
  window.location.href = "https://play.google.com/store/apps/details?id=com.survcashtompesa.pesatask";
 },1200);
}

window.onload=run;
</script>

</body>
</html>
